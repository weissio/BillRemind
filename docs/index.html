<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Mnemor Support</title>
    <style>
      :root {
        --bg: #eef3fb;
        --card: #ffffff;
        --text: #123059;
        --sub: #385f95;
        --line: #d4e0f4;
      }
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        background: var(--bg);
        color: var(--text);
      }
      .wrap {
        max-width: 760px;
        margin: 0 auto;
        padding: 24px;
      }
      .card {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 24px;
      }
      h1 {
        margin: 0 0 8px;
        font-size: 30px;
      }
      p {
        color: var(--sub);
        line-height: 1.6;
      }
      ul {
        color: var(--sub);
      }
      a {
        color: #0a63ff;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <h1>Mnemor Support</h1>
        <p>Supportseite fuer Mnemor Beleg Scanner OCR.</p>
        <ul>
          <li>E-Mail Support: <a href="mailto:mnemor.app@gmail.com">mnemor.app@gmail.com</a></li>
          <li><a href="./support.html">Support und Hilfe</a></li>
          <li><a href="./privacy.html">Datenschutz</a></li>
        </ul>
      </div>
    </div>
  </body>
</html>
